<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0f0a2e"/>
  <circle cx="32" cy="32" r="28" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>

  <!-- Laurel wreath - left branch -->
  <g fill="#22c55e" opacity="0.9">
    <!-- Left leaves -->
    <ellipse cx="16" cy="40" rx="3" ry="6" transform="rotate(30 16 40)"/>
    <ellipse cx="14" cy="34" rx="2.8" ry="5.5" transform="rotate(20 14 34)"/>
    <ellipse cx="14" cy="28" rx="2.5" ry="5" transform="rotate(5 14 28)"/>
    <ellipse cx="16" cy="22" rx="2.5" ry="5" transform="rotate(-15 16 22)"/>
    <ellipse cx="20" cy="17" rx="2.5" ry="4.5" transform="rotate(-35 20 17)"/>
    <ellipse cx="25" cy="14" rx="2.2" ry="4" transform="rotate(-50 25 14)"/>
    <!-- Left stem -->
    <path d="M18 44 Q12 32 20 16" fill="none" stroke="#16a34a" stroke-width="1.5"/>
  </g>

  <!-- Laurel wreath - right branch -->
  <g fill="#22c55e" opacity="0.9">
    <!-- Right leaves -->
    <ellipse cx="48" cy="40" rx="3" ry="6" transform="rotate(-30 48 40)"/>
    <ellipse cx="50" cy="34" rx="2.8" ry="5.5" transform="rotate(-20 50 34)"/>
    <ellipse cx="50" cy="28" rx="2.5" ry="5" transform="rotate(-5 50 28)"/>
    <ellipse cx="48" cy="22" rx="2.5" ry="5" transform="rotate(15 48 22)"/>
    <ellipse cx="44" cy="17" rx="2.5" ry="4.5" transform="rotate(35 44 17)"/>
    <ellipse cx="39" cy="14" rx="2.2" ry="4" transform="rotate(50 39 14)"/>
    <!-- Right stem -->
    <path d="M46 44 Q52 32 44 16" fill="none" stroke="#16a34a" stroke-width="1.5"/>
  </g>

  <!-- Indian Flag - Saffron stripe -->
  <rect x="24" y="22" width="16" height="4" rx="1" fill="#FF9933"/>
  <!-- Indian Flag - White stripe -->
  <rect x="24" y="26" width="16" height="4" rx="0" fill="#FFFFFF"/>
  <!-- Indian Flag - Green stripe -->
  <rect x="24" y="30" width="16" height="4" rx="1" fill="#138808"/>

  <!-- Ashoka Chakra (simplified) -->
  <circle cx="32" cy="28" r="2.8" fill="none" stroke="#000080" stroke-width="0.6"/>
  <circle cx="32" cy="28" r="0.5" fill="#000080"/>
  <!-- Chakra spokes -->
  <g stroke="#000080" stroke-width="0.35">
    <line x1="32" y1="25.2" x2="32" y2="30.8"/>
    <line x1="29.2" y1="28" x2="34.8" y2="28"/>
    <line x1="30" y1="26" x2="34" y2="30"/>
    <line x1="34" y1="26" x2="30" y2="30"/>
    <line x1="29.6" y1="26.6" x2="34.4" y2="29.4"/>
    <line x1="34.4" y1="26.6" x2="29.6" y2="29.4"/>
    <line x1="30.1" y1="29.5" x2="33.9" y2="26.5"/>
    <line x1="33.9" y1="29.5" x2="30.1" y2="26.5"/>
  </g>

  <!-- Bottom banner -->
  <path d="M14 46 Q16 42 32 42 Q48 42 50 46 Q48 50 32 50 Q16 50 14 46Z" fill="#c0392b"/>
  <path d="M14 46 Q16 42 32 42 Q48 42 50 46 Q48 50 32 50 Q16 50 14 46Z" fill="none" stroke="#e74c3c" stroke-width="0.5"/>
  <!-- Banner text -->
  <text x="32" y="47.5" text-anchor="middle" font-family="serif" font-size="5.5" font-weight="bold" fill="#fff" letter-spacing="0.3">SARKARI</text>
</svg>